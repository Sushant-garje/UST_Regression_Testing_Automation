output:
  lightweight_format: "optimized_testcases/"
  # ↑ Use this for fast execution (9 columns)
  
  full_data_format: "optimized_testcases_full/"
  # ↑ Use this for debugging (14-20 columns with full traceability)

# ================================
# 📝 HOW TO USE THIS FILE
# ================================
# 
# SCENARIO 1: Update Single Module
# ─────────────────────────────────
# Change this:
#   half_adder:
#     input_path: "half_adder_dataset.csv"
#
# To this (absolute path):
#   half_adder:
#     input_path: "/Users/sushant/Downloads/new_half_adder_tests.csv"
#
# Then run pipeline (it auto-detects format):
#   python3 normalize_datasets.py && python3 export_optimized_tests.py && python3 export_with_full_data.py
#
# ─────────────────────────────────
#
# SCENARIO 2: Update Multiple Modules
# ─────────────────────────────────
# Just update all paths at once:
#   half_adder:
#     input_path: "/path/to/new/half_adder.csv"
#   4bit_sub:
#     input_path: "/path/to/new/4bit_sub.csv"
#   register_comparator:
#     input_path: "/path/to/new/register_comp.csv"
#
# Then run full pipeline (all modules update in 5-10 seconds)
#
# ─────────────────────────────────
#
# SCENARIO 3: Disable a Module Temporarily
# ─────────────────────────────────
# Change:
#   register_counter:
#     enabled: false
#
# To:
#   register_counter:
#     enabled: true
#
# Script will skip disabled modules (even if file is missing)
#
# ─────────────────────────────────
#
# SCENARIO 4: Use Relative vs Absolute Paths
# ─────────────────────────────────
# 
# RELATIVE PATH (file in project folder):
#   input_path: "new_data.csv"
#   input_path: "14 april/results/data.csv"
#
# ABSOLUTE PATH (file anywhere on system):
#   input_path: "/Users/sushant/Downloads/data.csv"
#   input_path: "/Volumes/ExternalDrive/data/module.csv"

